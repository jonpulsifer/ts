name: "🐙 Build and Deploy with ArgoCD"

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - slingshot
          - hub
          - truffle

jobs:
  containerize:
    name: "🐳 Containerize"
    uses: ./.github/workflows/containerize.yaml
    with:
      app: ${{ inputs.app }}
  
  attest:
    needs: [containerize]
    name: "🔑 Attest"
    uses: ./.github/workflows/attest.yaml
    if: ${{ github.ref == 'refs/heads/main' }}
    with:
      image: ${{ needs.containerize.outputs.image }}
      digest: ${{ needs.containerize.outputs.digest }}

  deploy:
    needs: [containerize]
    name: "🐙 Deploy"
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.app }}
      url: https://${{inputs.app}}.lolwtf.ca
    env:
      ARGOCD_URL: argo-argocd-server.argo
    steps:
      - name: Download ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd http://${{ env.ARGOCD_URL }}/download/argocd-linux-amd64
          chmod +x /tmp/argocd
          sudo mv /tmp/argocd /usr/local/bin/argocd
      - name: Login to ArgoCD
        run: |
          echo y | argocd login --insecure --username ${{ secrets.ARGOCD_USERNAME }} --password ${{ secrets.ARGOCD_PASSWORD }} --grpc-web ${{ env.ARGOCD_URL }}
      - name: Update application revision and image to ${{ github.sha }}
        run: |
          APP="${{ inputs.app }}"
          SHA="${{ github.sha }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${APP}:${SHA}"

          if [ "$APP" = "truffle" ]; then
            argocd app set "$APP" \
              --revision="$SHA" \
              --kustomize-patch="$(cat <<PATCH
          - target:
              kind: Application
              name: truffle
            patch: |-
              - op: replace
                path: /spec/image
                value: ${IMAGE}
              - op: replace
                path: /spec/version
                value: "${SHA}"
          PATCH
          )"
          else
            argocd app set "$APP" \
              --revision="$SHA" \
              --kustomize-patch="$(cat <<PATCH
          - target:
              kind: Application
              name: ${APP}
            patch: |-
              - op: replace
                path: /spec/image
                value: ${IMAGE}
              - op: replace
                path: /spec/version
                value: "${SHA}"
          PATCH
          )"
          fi
